name: Birthday & Anniversary Notifier

on:
  # Daily schedule DISABLED 2026-06-19 — this notifier now runs in n8n.
  # Re-enable by uncommenting the two lines below if you ever revert off n8n.
  # schedule:
  #   - cron: '0 21 * * *'  # 7:00 AM AEST (UTC+10)
  workflow_dispatch:       # Manual trigger kept as a fallback

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run birthday notifier
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: python birthday_notifier.py
